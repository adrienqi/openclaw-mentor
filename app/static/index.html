<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0c0f12">
    <title>Mentor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <h1 class="brand">Mentor</h1>
            <div id="status-pill" class="pill pill--loading">...</div>
        </header>

        <main id="content">
            <section id="view-now" class="view active"></section>
            <section id="view-memory" class="view"></section>
            <section id="view-triggers" class="view"></section>
            <section id="view-more" class="view"></section>
        </main>

        <nav id="tab-bar">
            <button class="tab active" data-tab="now">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>Now</span>
            </button>
            <button class="tab" data-tab="memory">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span>Memory</span>
            </button>
            <button class="tab" data-tab="triggers">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                <span>Triggers</span>
            </button>
            <button class="tab" data-tab="more">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                <span>More</span>
            </button>
        </nav>
    </div>

    <!-- Token entry modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <h2>Enter PIN</h2>
            <p>Enter your dashboard PIN to continue.</p>
            <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" maxlength="12" placeholder="PIN" autocomplete="off">
            <button id="pin-submit" class="btn btn--primary">Unlock</button>
            <p id="pin-error" class="error-text"></p>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/api.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
